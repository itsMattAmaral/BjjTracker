services:
  postgres:
    image: postgres:16
    container_name: BjjTracker.Postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrator:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    container_name: BjjTracker.Migrator
    working_dir: /src
    volumes:
      - .:/src
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/src/migrate.sh"]

  bjjtracker_api:
    image: bjjtracker_api
    build:
      context: .
      dockerfile: BjjTracker.Api/Dockerfile
    container_name: BjjTracker.Api
    restart: unless-stopped
    ports:
      - "5001:8080"
    depends_on:
      migrator:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      applicationSettings__JWT_Secret: ${JWT_SECRET}

volumes:
  pgdata: